<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World — vibeSrc</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        color: #f9fafb;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.35), transparent 34rem),
          #0f172a;
      }

      main {
        width: min(640px, calc(100% - 32px));
        padding: 36px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
      }

      a {
        color: #93c5fd;
        font-weight: 800;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.4rem, 10vw, 5rem);
        line-height: 1;
        letter-spacing: -0.07em;
      }

      p {
        color: #cbd5e1;
        font-size: 1.1rem;
        line-height: 1.65;
      }

      #message {
        margin: 24px 0;
        padding: 18px;
        border-radius: 18px;
        background: rgba(147, 197, 253, 0.16);
        color: #dbeafe;
        font-size: 1.35rem;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <p><a href="../">← All projects</a></p>
      <h1>Hello World</h1>
      <p>This demo writes a greeting into the page with plain JavaScript.</p>
      <div id="message" aria-live="polite"></div>
    </main>

    <script>
      const message = document.querySelector("#message");
      message.textContent = "Hello, vibeSrc user 👋";
    </script>
  </body>
</html>
